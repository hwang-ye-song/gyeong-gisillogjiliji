<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>그림 터치 문진표 - 정확히 어디인가요?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <button id="btn-back" class="btn btn-secondary">
      <span class="icon">◀</span> <span class="text" data-i18n="btn_prev">이전</span>
    </button>
    <div id="progress-bar"><div id="progress-fill" style="width: 20%;"></div><span id="progress-text">1 / 5</span></div>
    <button id="btn-nurse-lock" class="btn-icon">🔒</button>
  </header>

  <section class="step active">
    <h1 class="speakable"><span id="title-span" data-i18n="step_1_title">어디가 아파요?</span><button class="btn-speaker">🔊</button></h1>
    
    <!-- Head Position Overlay -->
    <div id="head-pos-flow" class="hidden hurt-flow">
      <div class="symptoms-grid single-select">
        <button class="symptom-card" data-sub="part_head"><span class="emoji">🧑</span><span class="text" data-i18n="part_head">머리</span></button>
        <button class="symptom-card" data-sub="part_neck"><span class="emoji">🦒</span><span class="text" data-i18n="part_neck">목</span></button>
        <button class="symptom-card" data-sub="part_eye"><span class="emoji">👁️</span><span class="text" data-i18n="part_eye">눈</span></button>
        <button class="symptom-card" data-sub="part_ear"><span class="emoji">👂</span><span class="text" data-i18n="part_ear">귀</span></button>
        <button class="symptom-card" data-sub="part_nose"><span class="emoji">👃</span><span class="text" data-i18n="part_nose">코</span></button>
        <button class="symptom-card" data-sub="part_mouth"><span class="emoji">👄</span><span class="text" data-i18n="part_mouth">입·이</span></button>
      </div>
    </div>

    <!-- Side (Left/Right/Both) Selection Overlay -->
    <div id="side-select-flow" class="hidden hurt-flow">
      <div class="symptoms-grid single-select">
        <button class="symptom-card" data-side="left"><span class="emoji">👈</span><span class="text" data-i18n="side_left">왼쪽</span></button>
        <button class="symptom-card" data-side="right"><span class="emoji">👉</span><span class="text" data-i18n="side_right">오른쪽</span></button>
        <button class="symptom-card" data-side="both"><span class="emoji">🙌</span><span class="text" data-i18n="side_both">양쪽 다</span></button>
      </div>
    </div>
    
    <!-- Arm Part Selection Overlay -->
    <div id="arm-part-flow" class="hidden hurt-flow">
      <div class="symptoms-grid single-select">
        <button class="symptom-card" data-sub="arm_upper"><span class="emoji">🦾</span><span class="text" data-i18n="arm_upper">어깨·윗팔</span></button>
        <button class="symptom-card" data-sub="arm_lower"><span class="emoji">🦾</span><span class="text" data-i18n="arm_lower">팔꿈치·아랫팔</span></button>
        <button class="symptom-card" data-sub="arm_hand"><span class="emoji">🖐️</span><span class="text" data-i18n="arm_hand">손·손목</span></button>
      </div>
    </div>

    <!-- Leg Part Selection Overlay -->
    <div id="leg-part-flow" class="hidden hurt-flow">
      <div class="symptoms-grid single-select">
        <button class="symptom-card" data-sub="leg_thigh"><span class="emoji">🦵</span><span class="text" data-i18n="leg_thigh">허벅지</span></button>
        <button class="symptom-card" data-sub="leg_knee"><span class="emoji">🦵</span><span class="text" data-i18n="leg_knee">무릎</span></button>
        <button class="symptom-card" data-sub="leg_calf"><span class="emoji">🦵</span><span class="text" data-i18n="leg_calf">종아리·발목</span></button>
        <button class="symptom-card" data-sub="leg_foot"><span class="emoji">🦶</span><span class="text" data-i18n="leg_foot">발</span></button>
      </div>
    </div>

    
    <!-- Belly Position Overlay -->
    <div id="belly-pos-flow" class="hidden hurt-flow" style="position: relative; width: 100%; max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; align-items: center;">
      <!-- Labels -->
      <div class="belly-label label-left">
        <span class="label-text" data-i18n="side_left">왼쪽</span><br><span class="label-icon">🖐️</span>
      </div>
      <div class="belly-label label-right">
        <span class="label-text" data-i18n="side_right">오른쪽</span><br><span class="label-icon">🤚</span>
      </div>
      
      <!-- Container -->
      <div id="belly-container" style="position: relative; width: 100%; aspect-ratio: 535/1024; width: min(100%, calc(60vh * 0.52), 350px); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); background: #fff;">
        <img src="arms.png" alt="Belly" style="width: 100%; height: 100%; display: block; pointer-events: none; user-select: none;" draggable="false" />
        
                <svg id="belly-svg" viewBox="0 0 100 100" preserveAspectRatio="none" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
          <style>
            .belly-area { fill: transparent; stroke: rgba(156, 163, 175, 0.8); stroke-width: 0.5; stroke-dasharray: 1, 1; transition: fill 0.2s, stroke 0.2s; pointer-events: all; }
            .belly-area.highlight { fill: rgba(255, 107, 107, 0.5); stroke: rgba(255, 107, 107, 1); stroke-width: 1.5; stroke-dasharray: none; }
            .belly-area.highlight-danger { fill: rgba(239, 68, 68, 0.5); stroke: var(--emergency); stroke-width: 1.5; stroke-dasharray: none; }
          </style>
                                                            <!-- Left Arm -->
          <polygon points="67.1,42.0 64.7,37.9 63.7,30.3 89.3,12.5 92.1,16.8 93.6,29.2 91.4,42.0" class="belly-area" data-sub="arm_left_upper" />
          <polygon points="66.2,55.0 67.1,42.0 91.4,42.0 92.0,48.0 90.8,55.0" class="belly-area" data-sub="arm_left_elbow" />
          <polygon points="67.1,68.0 66.2,55.0 90.8,55.0 89.9,58.9 85.2,68.0" class="belly-area" data-sub="arm_left_lower" />
          <polygon points="61.1,76.0 67.1,68.0 85.2,68.0 83.9,76.0" class="belly-area" data-sub="arm_left_wrist" />
          <polygon points="83.9,76.0 88.0,89.0 88.0,92.2 82.2,95.8 75.0,97.5 71.2,97.5 63.7,96.1 52.1,86.6 52.1,85.0 58.1,78.2 61.1,76.0" class="belly-area" data-sub="arm_left_hand" />
          <!-- Right Arm -->
          <polygon points="33.1,42.0 8.6,41.9 6.4,29.4 7.9,16.9 10.7,12.6 36.3,30.4 35.7,36.8" class="belly-area" data-sub="arm_right_upper" />
          <polygon points="9.2,55.0 8.2,48.2 8.8,42.0 33.1,42.0 33.8,55.0" class="belly-area" data-sub="arm_right_elbow" />
          <polygon points="14.8,68.0 10.3,59.2 9.2,55.0 33.8,55.0 32.9,68.0" class="belly-area" data-sub="arm_right_lower" />
          <polygon points="14.8,68.0 32.9,68.0 39.1,76.0 16.1,76.0" class="belly-area" data-sub="arm_right_wrist" />
          <polygon points="39.1,76.0 47.9,85.0 47.7,86.8 36.3,96.1 28.8,97.5 25.0,97.5 17.8,95.8 11.8,91.9 16.1,76.0" class="belly-area" data-sub="arm_right_hand" />
        </svg>
        <canvas id="belly-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none;"></canvas>

        
      </div>
      
            <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;">
        <button id="btn-draw-mode" class="btn btn-primary">그리기 🖍️</button>
        <button id="btn-erase-mode" class="btn btn-secondary">지우개 🧼</button>
        <button id="btn-clear-all" class="btn btn-secondary">전체 지우기 🗑️</button>
        <button id="btn-belly-done" class="btn btn-primary" style="display: none; width: 100%;">확인 ✔️</button>
      </div>
    </div>


    <div class="step-actions" style="justify-content: center;">
      <button class="btn btn-secondary btn-idk" data-i18n="idk">잘 모르겠어요</button>
    </div>
  </section>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let state = getState();
      
      if (!state.part) { window.location.href = 'step1.html'; return; }

      function updateTitle(i18nKey) {
        const span = document.getElementById('title-span');
        span.setAttribute('data-i18n', i18nKey);
        applyLanguageToUI();
      }

      const showFlow = (id) => {
        document.querySelectorAll('.hurt-flow').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
      };

      // Flow Logic
      const lang = state.lang || 'ko';
      const t = translations[lang] || translations.ko;

      // Arm Canvas Logic
      updateTitle('part_arm');
      showFlow('belly-pos-flow');
      
      const canvas = document.getElementById('belly-canvas');
      const ctx = canvas.getContext('2d');
      let drawing = false;
      let debounceTimer = null;
      let currentMode = 'draw';
      
      const resize = () => {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
      };
      window.addEventListener('resize', resize);
      resize();

      const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top, cx: clientX, cy: clientY };
      };

      const startDraw = (e) => {
        e.preventDefault();
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        clearTimeout(debounceTimer);
      };

      const draw = (e) => {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = currentMode === 'erase' ? 'rgba(156, 163, 175, 0.5)' : 'rgba(255, 107, 107, 0.8)'; 
        ctx.lineWidth = currentMode === 'erase' ? 20 : 10;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
      };

      const evaluateCanvas = () => {
        canvas.style.pointerEvents = 'none'; // Temporarily disable to hit SVG
        const rect = canvas.getBoundingClientRect();
        
        let hitCounts = {};
        let totalHits = 0;
        
        try {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          
          for (let y = 0; y < canvas.height; y += 10) {
            for (let x = 0; x < canvas.width; x += 10) {
              const idx = (y * canvas.width + x) * 4;
              if (data[idx + 3] > 0) { // Painted pixel
                const el = document.elementFromPoint(rect.left + x, rect.top + y);
                if (el && el.classList.contains('belly-area')) {
                  const sub = el.getAttribute('data-sub');
                  hitCounts[sub] = (hitCounts[sub] || 0) + 1;
                  totalHits++;
                }
              }
            }
          }
        } catch(e) {
           console.error("Canvas read error:", e);
        }
        
        canvas.style.pointerEvents = 'auto'; // Re-enable
        
        if (totalHits > 0) {
          ctx.clearRect(0, 0, canvas.width, canvas.height); 
          
          const activeRegions = [];
          for (const [sub, count] of Object.entries(hitCounts)) {
            if (count > totalHits * 0.05) { // lowered threshold slightly to catch small scribbles
              activeRegions.push(sub);
            }
          }
          
          if (activeRegions.length > 0) {
            activeRegions.forEach(sub => {
                const svgEl = document.querySelector(`.belly-area[data-sub="${sub}"]`);
                if (currentMode === 'erase') {
                    svgEl.classList.remove('highlight');
                } else {
                    svgEl.classList.add('highlight');
                }
            });
          }
        }
        
        const allActive = [];
        document.querySelectorAll('.belly-area').forEach(el => {
            if (el.classList.contains('highlight')) {
                allActive.push(el.getAttribute('data-sub'));
            }
        });

        if (allActive.length > 0) {
            const groupSide = (parts, sidePrefix, sideName) => {
                if (parts.length === 0) return [];
                if (parts.length === 5) {
                    return [{ id: `${sidePrefix}all`, name: `${sidePrefix}all`, lookupPart: '팔·손' }];
                }
                
                const hasUpper = parts.some(p => p.includes('_upper'));
                const hasElbow = parts.some(p => p.includes('_elbow'));
                const hasLower = parts.some(p => p.includes('_lower'));
                const hasWrist = parts.some(p => p.includes('_wrist'));
                const hasHand = parts.some(p => p.includes('_hand'));
                
                if (parts.length === 1) {
                    let lookup = '팔·손';
                    if (hasUpper) lookup = '어깨·윗팔';
                    if (hasElbow) lookup = '팔꿈치';
                    if (hasLower) lookup = '아랫팔';
                    if (hasWrist) lookup = '손목';
                    if (hasHand) lookup = '손';
                    // 부위가 딱 1개일 때는 '왼쪽 손목', '오른쪽 팔꿈치' 등 고유 이름을 그대로 살려줍니다.
                    return [{ id: parts[0], name: parts[0], lookupPart: lookup }];
                }

                const midCount = (hasElbow ? 1 : 0) + (hasLower ? 1 : 0);
                const bottomCount = (hasWrist ? 1 : 0) + (hasHand ? 1 : 0);
                
                // 2개 이상의 부위가 선택되었을 때만 그룹화된 이름을 사용합니다.
                if (!hasUpper && midCount > 0 && bottomCount === 0) {
                    return [{ id: `${sidePrefix}mid`, name: `${sidePrefix}mid`, lookupPart: '팔꿈치·아랫팔' }];
                }
                if (!hasUpper && midCount === 0 && bottomCount > 0) {
                    return [{ id: `${sidePrefix}bot`, name: `${sidePrefix}bot`, lookupPart: '손·손목' }];
                }
                
                return [{ id: `${sidePrefix}multi`, name: `${sidePrefix}multi`, lookupPart: '팔·손' }];
            };
            
            const leftParts = allActive.filter(id => id.includes('arm_left_'));
            const rightParts = allActive.filter(id => id.includes('arm_right_'));
            
            state.partsQueue = [
                ...groupSide(leftParts, 'arm_left_', '왼쪽'),
                ...groupSide(rightParts, 'arm_right_', '오른쪽')
            ];
            
            document.getElementById('btn-belly-done').style.display = 'block';
        } else {
            state.partsQueue = null;
            document.getElementById('btn-belly-done').style.display = 'none';
        }
      };

      const stopDraw = () => {
        if (!drawing) return;
        drawing = false;
        debounceTimer = setTimeout(evaluateCanvas, 500);
      };

      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', draw);
      window.addEventListener('mouseup', stopDraw);
      
      canvas.addEventListener('touchstart', startDraw, {passive: false});
      canvas.addEventListener('touchmove', draw, {passive: false});
      window.addEventListener('touchend', stopDraw);
      
      document.getElementById('btn-draw-mode').onclick = () => {
        currentMode = 'draw';
        document.getElementById('btn-draw-mode').className = 'btn btn-primary';
        document.getElementById('btn-erase-mode').className = 'btn btn-secondary';
      };
      
      document.getElementById('btn-erase-mode').onclick = () => {
        currentMode = 'erase';
        document.getElementById('btn-erase-mode').className = 'btn btn-primary';
        document.getElementById('btn-draw-mode').className = 'btn btn-secondary';
      };
      
      document.getElementById('btn-clear-all').onclick = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.querySelectorAll('.belly-area').forEach(el => {
          el.classList.remove('highlight');
        });
        document.getElementById('btn-belly-done').style.display = 'none';
        state.partsQueue = null;
      };
      
      document.getElementById('btn-belly-done').onclick = () => {
        if (state.partsQueue && state.partsQueue.length > 0) {
          saveState(state);
          window.location.href = 'step2.html';
        }
      };

      // I don't know button
      document.querySelector('.btn-idk').addEventListener('click', () => {
        if (state.part === translations.ko['part_head']) {
          state.headSubSelected = true;
        } else if (state.part === translations.ko['part_belly'] || state.part === translations.ko['part_arm']) {
          state.partsQueue = [{ id: 'idk', name: translations.ko['idk'], lookupPart: '배' }];
        } else if (state.sideSelect) {
          if (!state.sideSelected) {
             state.sideSelected = true;
             state.sideLabel = translations.ko['idk'];
             saveState(state);
             location.reload();
             return;
          } else {
             state.part = `${state.sideSelect === 'arm' ? '팔·손' : '다리·발'} (${state.sideLabel} ${translations.ko['idk']})`;
          }
        }
        saveState(state);
        window.location.href = 'step2.html';
      });

      // Back Button
      document.getElementById('btn-back').addEventListener('click', () => {
        if (state.sideSelect && state.sideSelected) {
          state.sideSelected = false;
          state.sideLabel = null;
          saveState(state);
          location.reload();
        } else {
          window.location.href = 'step1.html';
        }
      });

      applyLanguageToUI();
    });
  </script>
</body>
</html>
