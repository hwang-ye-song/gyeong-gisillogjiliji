<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>그림 터치 문진표 - 어떻게 아파요?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <button id="btn-back" class="btn btn-secondary">
      <span class="icon">◀</span> <span class="text" data-i18n="btn_prev">이전</span>
    </button>
    <div id="progress-bar"><div id="progress-fill" style="width: 40%;"></div><span id="progress-text">2 / 5</span></div>
    <button id="btn-nurse-lock" class="btn-icon">🔒</button>
  </header>

  <section class="step active">
    <h1 class="speakable"><span id="title-span" data-i18n="step_2_title">어떻게 아파요?</span><button class="btn-speaker">🔊</button></h1>
    <div id="selected-part-display" style="text-align: center; color: var(--primary); font-weight: bold; margin-bottom: 1.5rem; font-size: 1.1rem; background: rgba(99,102,241,0.1); padding: 0.5rem 1rem; border-radius: 8px; width: fit-content; margin-left: auto; margin-right: auto;"></div>
    
    <!-- Special Hurt Flow Containers -->
    <div id="hurt-flow-1" class="hidden hurt-flow">
      <div class="symptoms-grid single-select">
        <button class="symptom-card" data-hurt="hurt_1"><span class="emoji">🤸</span><span class="text" data-i18n="hurt_1">넘어짐</span></button>
        <button class="symptom-card" data-hurt="hurt_2"><span class="emoji">💥</span><span class="text" data-i18n="hurt_2">부딪힘</span></button>
        <button class="symptom-card" data-hurt="hurt_3"><span class="emoji">🔪</span><span class="text" data-i18n="hurt_3">베임</span></button>
        <button class="symptom-card" data-hurt="hurt_4"><span class="emoji">🦶</span><span class="text" data-i18n="hurt_4">접질림</span></button>
        <button class="symptom-card btn-idk-card"><span class="emoji">❓</span><span class="text" data-i18n="idk">잘 모르겠어요</span></button>
      </div>
    </div>
    
    <div id="hurt-flow-2" class="hidden hurt-flow">
      <div class="symptoms-grid single-select">
        <button class="symptom-card" data-state="state_1"><span class="emoji">🩸</span><span class="text" data-i18n="state_1">피가 나요</span></button>
        <button class="symptom-card" data-state="state_2"><span class="emoji">🎈</span><span class="text" data-i18n="state_2">부었어요</span></button>
        <button class="symptom-card" data-state="state_3"><span class="emoji">🫐</span><span class="text" data-i18n="state_3">멍들었어요</span></button>
        <button class="symptom-card" data-state="state_4"><span class="emoji">⚡</span><span class="text" data-i18n="state_4">움직이면 아파요</span></button>
        <button class="symptom-card btn-idk-card"><span class="emoji">❓</span><span class="text" data-i18n="idk">잘 모르겠어요</span></button>
      </div>
    </div>

    <div id="head-q-flow" class="hidden hurt-flow">
      <div class="symptoms-grid single-select">
        <button class="symptom-card" data-headq="yes"><span class="emoji">⭕</span><span class="text" data-i18n="yes">네</span></button>
        <button class="symptom-card" data-headq="no"><span class="emoji">❌</span><span class="text" data-i18n="no">아니요</span></button>
        <button class="symptom-card btn-idk-card"><span class="emoji">❓</span><span class="text" data-i18n="idk">잘 모르겠어요</span></button>
      </div>
    </div>

    <!-- Normal Symptoms Grid -->
    <div id="symptoms-container" class="symptoms-grid hidden"></div>

    <div class="step-actions">
      <button id="btn-next" class="btn btn-primary" data-i18n="btn_next" disabled>다음</button>
    </div>
  </section>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let state = getState();
      
      state.records = state.records || [];
      
      // Convert legacy single part to partsQueue
      if ((!state.partsQueue || state.partsQueue.length === 0) && state.part) {
          state.partsQueue = [{ id: 'single', name: state.part, lookupPart: state.part }];
      }
      
      // If no queue, go back
      if (!state.partsQueue || state.partsQueue.length === 0) {
          window.location.href = 'step1.html'; return;
      }
      
      state.currentPartObj = state.partsQueue[0];
      state.symptoms = state.symptoms || [];
      
      // Reset symptoms if going back to this page
      if (state.currentPartObj.lookupPart !== '다쳤어요') {
          state.symptoms = state.symptoms.filter(s => !s.startsWith('다침:'));
      }

      function updateTitle(i18nKey) {
        const span = document.getElementById('title-span');
        span.setAttribute('data-i18n', i18nKey);
        applyLanguageToUI();
      }

      const showFlow = (id) => {
        document.querySelectorAll('.hurt-flow, #symptoms-container').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
      };

      // 1. Hurt Flow
      if (state.currentPartObj.lookupPart === '다쳤어요' && !state.hurtMethod) {
        updateTitle('hurt_how');
        showFlow('hurt-flow-1');
        document.querySelectorAll('[data-hurt]').forEach(btn => {
          btn.onclick = (e) => {
            state.hurtMethod = translations.ko[e.currentTarget.dataset.hurt];
            saveState(state);
            // Ask State
            updateTitle('hurt_state');
            showFlow('hurt-flow-2');
          };
        });
        
        document.querySelectorAll('[data-state]').forEach(btn => {
          btn.onclick = (e) => {
            state.hurtState = translations.ko[e.currentTarget.dataset.state];
            saveState(state);
            state.symptoms = [`다침: ${state.hurtMethod}, ${state.hurtState}`];
            saveState(state);
            window.location.href = 'step3.html';
          };
        });
      }
      // 2. Normal Symptoms Flow
      else {
        renderSymptoms();
      }

      function renderSymptoms() {
        updateTitle('step_2_title');
        
        const partDisplay = document.getElementById('selected-part-display');
        
        // Display title with loop index context
        const total = state.records.length + state.partsQueue.length;
        const currentIdx = state.records.length + 1;
        
        let displayStr = state.currentPartObj.name;
        // Translate belly parts if needed
        const t = translations[state.lang] || translations['ko'];
        if (t[displayStr]) displayStr = t[displayStr];
        else if (t[state.currentPartObj.id]) displayStr = t[state.currentPartObj.id];
        
        if (total > 1) {
             partDisplay.innerText = `📍 ${t['pain_1'] ? t['pain_1'].replace('1', currentIdx) : '통증 ' + currentIdx}: ${displayStr}`;
        } else {
             partDisplay.innerText = `📍 ${t['summary_part'] || '선택한 부위'}: ${displayStr}`;
        }
        
        showFlow('symptoms-container');
        const container = document.getElementById('symptoms-container');
        container.innerHTML = '';
        
        let lookupPart = state.currentPartObj.lookupPart;
        if (lookupPart.includes(' (')) {
            const base = lookupPart.split(' (')[0];
            const detail = lookupPart.split(' (')[1].replace(')', '');
            const subParts = ['어깨·윗팔', '팔꿈치·아랫팔', '손·손목', '허벅지', '무릎', '종아리·발목', '발'];
            const found = subParts.find(sp => detail.includes(sp));
            lookupPart = found && symptomsData[found] ? found : base;
        }
        
        let symptomsList = symptomsData[lookupPart] || [];
        symptomsList.forEach(s => {
          const btn = document.createElement('button');
          btn.className = 'symptom-card multi-select ' + (state.symptoms.includes(s.ko) ? 'selected' : '');
          btn.innerHTML = `<span class="emoji">${s.icon}</span><span class="text">${s[state.lang] || s.ko}</span>`;
          btn.onclick = () => {
            if (state.symptoms.includes(s.ko)) {
              state.symptoms = state.symptoms.filter(sym => sym !== s.ko);
              btn.classList.remove('selected');
            } else {
              state.symptoms.push(s.ko);
              btn.classList.add('selected');
            }
            saveState(state);
            document.getElementById('btn-next').disabled = state.symptoms.length === 0;
          };
          container.appendChild(btn);
        });
        
        // Add IDK card
        const idkBtn = document.createElement('button');
        idkBtn.className = 'symptom-card btn-idk-card';
        idkBtn.innerHTML = `<span class="emoji">❓</span><span class="text">${translations[state.lang].idk || translations.ko.idk}</span>`;
        idkBtn.onclick = () => {
            state.symptoms = [translations.ko.idk];
            saveState(state);
            window.location.href = 'step3.html';
        };
        container.appendChild(idkBtn);

        document.getElementById('btn-next').disabled = state.symptoms.length === 0;
        document.getElementById('btn-next').onclick = () => {
          if (state.currentPartObj.lookupPart === '머리' && state.symptoms.some(s => s === '머리를 다쳤어요' || s === '부딪혔어요')) {
            updateTitle('head_q');
            showFlow('head-q-flow');
          } else {
            window.location.href = 'step3.html';
          }
        };

        // Head Q Flow
        document.querySelectorAll('[data-headq]').forEach(btn => {
          btn.onclick = (e) => {
            state.headQ = e.currentTarget.dataset.headq === 'yes' ? true : false;
            saveState(state);
            window.location.href = 'step3.html';
          };
        });
      }

      // I don't know button logic for hardcoded flows
      document.querySelectorAll('.btn-idk-card').forEach(btn => {
        btn.addEventListener('click', () => {
          if (state.currentPartObj.lookupPart === '다쳤어요') {
            if (!state.hurtMethod) {
              state.hurtMethod = translations.ko.idk;
              saveState(state);
              updateTitle('hurt_state');
              showFlow('hurt-flow-2');
            } else {
              state.hurtState = translations.ko.idk;
              state.symptoms = [`다침: ${state.hurtMethod}, ${state.hurtState}`];
              saveState(state);
              window.location.href = 'step3.html';
            }
          } else if (!document.getElementById('head-q-flow').classList.contains('hidden')) {
            state.headQ = null; // or whatever represents idk for headQ
            saveState(state);
            window.location.href = 'step3.html';
          }
        });
      });

      // Back Button
      document.getElementById('btn-back').addEventListener('click', () => {
        if (state.currentPartObj.lookupPart === '다쳤어요') {
          if (state.hurtMethod && !state.hurtState) {
            state.hurtMethod = null;
            saveState(state);
            location.reload();
          } else {
            window.location.href = 'step1.html';
          }
        } else if (!document.getElementById('head-q-flow').classList.contains('hidden')) {
          showFlow('symptoms-container');
          updateTitle('step_2_title');
        } else {
          // Check if we came from step1_sub (i.e. we have sub-divisions)
          if (state.sideSelect || state.headSubSelected || state.bellyPos || state.part === '가슴' || state.part === '등') {
              if (state.headSubSelected) {
                  state.headSubSelected = false;
                  state.part = '머리';
              }
              if (state.bellyPos || state.part === '가슴' || state.part === '등') {
                  state.bellyPos = null;
                  state.part = '몸통';
              }
              saveState(state);
              window.location.href = 'step1_sub.html';
          } else {
              window.location.href = 'step1.html';
          }
        }
      });

      applyLanguageToUI();
    });
  </script>
</body>
</html>
