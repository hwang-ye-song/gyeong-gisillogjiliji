<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>그림 터치 문진표 - 제출 확인</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .entry-summary {
      border: 2px solid var(--secondary);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1rem;
      background: #FAFAFA;
    }
    .popup-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .popup-content {
      background: white; padding: 2rem; border-radius: 16px; text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15); transform: translateY(20px); transition: transform 0.3s;
    }
    .popup-overlay.show { opacity: 1; pointer-events: auto; }
    .popup-overlay.show .popup-content { transform: translateY(0); }
    .entry-summary h3 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <header>
    <button id="btn-back" class="btn btn-secondary">
      <span class="icon">◀</span> <span class="text" data-i18n="btn_prev">이전</span>
    </button>
    <div id="progress-bar"><div id="progress-fill" style="width: 100%;"></div><span id="progress-text">5 / 5</span></div>
    <button id="btn-nurse-lock" class="btn-icon">🔒</button>
  </header>

  <section class="step active">
    <h1 class="speakable"><span data-i18n="step_5_title">이대로 보낼까요?</span><button class="btn-speaker">🔊</button></h1>
    <div id="summary-container" class="summary-card">
      <!-- Generated by JS -->
    </div>
    <div class="step-actions">
      <!-- 삭제요청: 다른 곳도 아파요 / 새로 작성하기 버튼 제거 -->
      <button id="btn-submit" class="btn btn-primary btn-pulse" data-i18n="btn_submit">맞아요 (보내기)</button>
    </div>
  </section>

  <div id="success-popup" class="popup-overlay">
    <div class="popup-content">
      <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
      <h2 style="color: var(--primary); margin-bottom: 0.5rem;" data-i18n="popup_success">전달 완료!</h2>
      <p style="color: var(--text-sub);" data-i18n="popup_desc">선생님께 전달되었습니다.</p>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let state = getState();
      
      document.getElementById('btn-back').addEventListener('click', () => {
        window.location.href = 'step4_allergy.html';
      });

      // If we got here directly without an active entry but we have previous entries, it's weird, but handle it.
      if (!state.part && state.previousEntries.length === 0) { window.location.href = 'step1.html'; return; }

      const container = document.getElementById('summary-container');
      
      // Build an array of all entries
      let allEntries = [...state.previousEntries];
      // Only push current if it's filled out
      if (state.part) {
        allEntries.push({
          part: state.part,
          bellyPos: state.bellyPos,
          hurtMethod: state.hurtMethod,
          hurtState: state.hurtState,
          headQ: state.headQ,
          symptoms: state.symptoms,
          painLevels: state.painLevels,
          startTimes: state.startTimes,
          followups: state.followups
        });
      }

      // Embed allergies into the first entry so db.js and nurse.html can access them
      if (allEntries.length > 0 && state.allergies && state.allergies.length > 0) {
        allEntries[0].allergies = state.allergies;
      }

      container.innerHTML = allEntries.map((e, idx) => {
        const lang = state.lang || 'ko';
        const t = translations[lang] || translations.ko;
        
        const translatedPart = translateKoToLang(e.part, state.lang);
        const translatedBelly = e.bellyPos ? translateKoToLang(e.bellyPos, state.lang) : '';
        
        const symptomDetails = e.symptoms.map(s => {
           const tSym = translateKoToLang(s, state.lang);
           const pain = (e.painLevels && e.painLevels[s]) || '0';
           const timeKeyStr = e.startTimes && e.startTimes[s] ? e.startTimes[s] : "잘 모르겠어요";
           const tTime = translateKoToLang(timeKeyStr, state.lang);
           return `${tSym} (${pain}/10, ${tTime})`;
        }).join('<br>');
        
        let itemsHTML = `
          <div class="summary-item"><strong>${t.summary_part}:</strong> <span>${translatedPart} ${translatedBelly ? `(${translatedBelly})` : ''}</span></div>
          <div class="summary-item"><strong>${t.summary_symptom_label}:</strong> <br><span style="display:inline-block; margin-top:0.3rem;">${symptomDetails}</span></div>
        `;
        if (e.followups && e.followups.length) {
          e.followups.forEach(f => {
            const translatedQ = translateKoToLang(f.q, state.lang);
            const translatedA = translateKoToLang(f.a, state.lang);
            itemsHTML += `<div class="summary-item"><strong>${translatedQ}:</strong> <span>${translatedA}</span></div>`;
          });
        }
        return `<div class="entry-summary"><h3>${t.summary_symptom} ${idx + 1}</h3>${itemsHTML}</div>`;
      }).join('');

      // Add allergy info (shared across all entries)
      if (state.allergies && state.allergies.length > 0) {
        const lang = state.lang || 'ko';
        const t = translations[lang] || translations.ko;
        const allergyLabels = state.allergies.map(a => translateKoToLang(translations.ko[a] || a, state.lang)).join(', ');
        container.innerHTML += `<div class="entry-summary"><h3>${t.summary_allergy_info}</h3><div class="summary-item"><strong>${t.summary_allergy_label}:</strong> <span>${allergyLabels}</span></div></div>`;
      }

      // btn-restart 이벤트 리스너 제거 완료

      document.getElementById('btn-submit').addEventListener('click', () => {
        const flags = evaluateEmergency(allEntries);
        const finalEntries = allEntries;
        
        // DB 스키마 에러 방지: allergies를 별도 컬럼이 아닌 entries_json 내부에 저장
        if (finalEntries.length > 0) {
          finalEntries[0].allergies = state.allergies || [];
        }

        // 로컬 큐에 추가 (db.js가 백그라운드에서 처리함)
        const queue = JSON.parse(localStorage.getItem('sync_queue') || '[]');
        queue.push({
          lang: state.lang,
          entries_json: finalEntries,
          emergency_flags: Array.from(flags),
          created_at: new Date().toISOString()
        });
        localStorage.setItem('sync_queue', JSON.stringify(queue));

        // 팝업 띄우기
        const popup = document.getElementById('success-popup');
        popup.classList.add('show');

        // 1.5초 후 초기화 및 이동
        setTimeout(() => {
          clearState();
          window.location.href = 'index.html';
        }, 1500);
      });
    });
  </script>
</body>
</html>
