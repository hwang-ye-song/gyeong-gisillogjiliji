<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>그림 터치 문진표 - 어디가 아파요?</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .body-map-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      min-height: 0; /* flex 자식이 overflow 되지 않도록 */
    }
    .svg-body {
      flex: 1 1 auto;
      max-height: 100%;
      max-width: 320px;
      width: auto;
      height: auto;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }
    .hitbox {
      fill: transparent;
      stroke: transparent;
      cursor: pointer;
      transition: fill 0.15s;
    }
    .hitbox:hover, .hitbox:active, .hitbox.hover-highlight {
      fill: rgba(99, 102, 241, 0.25);
      stroke: var(--primary);
      stroke-width: 2;
    }
    .hitbox.highlight {
      fill: rgba(99, 102, 241, 0.3);
      stroke: var(--primary);
      stroke-width: 3;
    }
    .whole-body-btn {
      flex-shrink: 0;
      padding: 0.6rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
    }
    .whole-body-btn .emoji {
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <header>
    <button class="btn btn-secondary" onclick="window.location.href='step0_profile.html'">
      <span class="icon">◀</span> <span class="text" data-i18n="btn_prev">이전</span>
    </button>
    <div id="progress-bar"><div id="progress-fill" style="width: 20%;"></div><span id="progress-text">1 / 5</span></div>
    <button id="btn-nurse-lock" class="btn-icon">🔒</button>
  </header>

  <section class="step active">
    <h1 class="speakable"><span data-i18n="step_1_title">어디가 아파요?</span><button class="btn-speaker">🔊</button></h1>

    <!-- Body Map Interface -->
    <div class="body-map-container" style="position: relative; width: min(100%, calc(55vh * 0.455), 250px); margin: 0 auto 1rem auto;">
      <img src="body_cropped.png" alt="Body" style="width: 100%; display: block; border-radius: 12px; pointer-events: none;" />
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
        <style>
          .body-area { fill: transparent; cursor: pointer; transition: fill 0.2s; }
          .body-area:hover, .body-area:active, .body-area.hover-highlight { fill: rgba(74, 144, 226, 0.5); }
          .body-area.highlight { fill: rgba(74, 144, 226, 0.6); stroke: var(--primary); stroke-width: 0.5; }
        </style>
        <!-- 머리 및 목 -->
        <polygon points="43.4,2.2 39.7,4.1 38.6,8.9 39.2,11.3 41.8,12.8 42.3,15.9 40.7,17.1 34.4,18.1 33.9,19.0 67.2,19.0 67.2,18.3 60.3,16.6 58.2,14.9 58.2,12.8 61.4,10.6 60.8,4.1 55.6,1.7 45.5,1.7" class="body-area" data-part="part_head" />
        <!-- 가슴 -->
        <polygon points="24.9,20.7 24.3,41.2 29.1,41.2 32.3,35.4 31.7,41.2 68.8,41.2 68.3,34.9 70.9,40.7 75.1,41.2 75.1,20.2 68.3,18.6 33.3,18.6" class="body-area" data-part="part_chest" />
        <!-- 배 -->
        <polygon points="31.2,41.0 31.2,43.9 29.1,48.0 29.6,55.2 72.0,55.2 72.0,49.2 68.8,40.7" class="body-area" data-part="part_belly" />
        <!-- 양팔 -->
        <polygon points="25.4,22.7 23.3,23.1 21.7,34.2 18.0,38.8 12.2,51.6 3.7,54.9 4.8,56.1 8.5,55.9 8.5,60.0 11.1,61.0 15.9,60.7 16.4,59.0 19.6,59.3 20.1,51.6 25.4,46.0" class="body-area" data-part="part_arm" />
        <polygon points="74.1,20.5 74.1,44.6 81.5,52.0 82.5,59.0 84.7,59.5 85.2,60.7 89.9,61.0 91.0,60.0 93.1,60.0 93.1,56.1 96.8,56.1 96.8,54.9 89.4,51.6 86.2,47.5 83.6,39.5 79.4,33.5 78.3,22.9 76.2,20.5" class="body-area" data-part="part_arm" />
        <!-- 양다리 -->
        <polygon points="50.3,54.7 30.2,54.7 33.9,66.0 32.8,77.3 34.9,87.0 28.0,94.9 30.2,96.6 37.6,97.3 39.7,96.4 42.9,88.4 45.0,71.6 47.1,69.6" class="body-area" data-part="part_leg" />
        <polygon points="49.2,54.7 49.2,57.6 52.4,58.3 65.6,96.4 68.3,98.6 75.1,97.6 75.1,92.3 69.8,86.7 70.9,73.0 68.8,70.1 72.0,54.7" class="body-area" data-part="part_leg" />
      </svg>
    </div>
    
    <!-- 온몸이 아파요 (몸 전체) 버튼 -->
    <div style="text-align: center; margin-bottom: 1rem;">
      <button class="symptom-card" data-part="part_whole" style="padding: 0.6rem 1.5rem; border-radius: 30px; font-weight: bold; background: white; border: 2px solid #e2e8f0; color: var(--primary); display: inline-flex; align-items: center; gap: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <span class="emoji" style="font-size: 1.2rem;">🤒</span>
        <span class="text" data-i18n="part_whole">몸 전체</span>
      </button>
    </div>
  </section>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.symptom-card, .body-area').forEach(btn => {
        btn.addEventListener('mouseenter', (e) => {
          const partKey = e.currentTarget.dataset.part;
          if (partKey === 'part_arm' || partKey === 'part_leg') {
            document.querySelectorAll(`.body-area[data-part="${partKey}"]`).forEach(el => el.classList.add('hover-highlight'));
          }
        });
        
        btn.addEventListener('mouseleave', (e) => {
          const partKey = e.currentTarget.dataset.part;
          if (partKey === 'part_arm' || partKey === 'part_leg') {
            document.querySelectorAll(`.body-area[data-part="${partKey}"]`).forEach(el => el.classList.remove('hover-highlight'));
          }
        });

        btn.addEventListener('click', (e) => {
          let state = getState();
          const target = e.currentTarget;
          const partKey = target.dataset.part;
          
          state.headSubSelected = false; 
          state.bellyPos = null; 
          state.hurtMethod = null; 
          state.hurtState = null; 
          state.symptoms = [];
          state.records = [];
          state.partsQueue = null;
          
          if (partKey === 'part_chest') {
            state.part = (translations.ko['part_belly'] || '가슴/배/등') + ' (' + (translations.ko['belly_chest'] || '가슴') + ')';
          } else {
            state.part = translations.ko[partKey] || partKey;
          }
          
          if (partKey === 'idk') {
            state.sideSelect = null;
            state.symptoms.push(translations.ko['idk']);
            saveState(state);
            window.location.href = 'step4.html';
          } else if (partKey === 'part_arm') {
            saveState(state);
            window.location.href = 'step1_arm.html';
          } else if (partKey === 'part_leg') {
            state.sideSelect = 'leg';
            saveState(state);
            window.location.href = 'step1_sub.html';
          } else if (partKey === 'part_head' || partKey === 'part_belly') {
            state.sideSelect = null;
            saveState(state);
            window.location.href = 'step1_sub.html';
          } else if (partKey === 'part_chest') {
            state.sideSelect = null;
            saveState(state);
            window.location.href = 'step2.html';
          } else {
            state.sideSelect = null;
            saveState(state);
            window.location.href = 'step2.html';
          }
        });
      });
    });
  </script>
</body>
</html>
