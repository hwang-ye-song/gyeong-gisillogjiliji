<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>그림 터치 문진표 - 알레르기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <button id="btn-back" class="btn btn-secondary">
      <span class="icon">◀</span> <span class="text" data-i18n="btn_prev">이전</span>
    </button>
    <div id="progress-bar"><div id="progress-fill" style="width: 90%;"></div><span id="progress-text">4.5 / 5</span></div>
    <button id="btn-nurse-lock" class="btn-icon">🔒</button>
  </header>

  <section class="step active">
    <!-- Allergy selection -->
    <div id="allergy-container">
      <h2 class="speakable" style="text-align: center;"><span data-i18n="allergy_title">알레르기가 있어요?</span><button class="btn-speaker">🔊</button></h2>
      <div class="symptoms-grid" id="allergy-grid" style="margin-top: 2rem;">
        <button class="symptom-card" data-allergy="allergy_none"><span class="emoji">✅</span><span class="text" data-i18n="allergy_none">없어요</span></button>
        <button class="symptom-card" data-allergy="allergy_drug"><span class="emoji">💊</span><span class="text" data-i18n="allergy_drug">약</span></button>
        <button class="symptom-card" data-allergy="allergy_peanut"><span class="emoji">🥜</span><span class="text" data-i18n="allergy_peanut">땅콩/견과류</span></button>
        <button class="symptom-card" data-allergy="allergy_milk"><span class="emoji">🥛</span><span class="text" data-i18n="allergy_milk">우유</span></button>
        <button class="symptom-card" data-allergy="allergy_egg"><span class="emoji">🥚</span><span class="text" data-i18n="allergy_egg">계란</span></button>
        <button class="symptom-card" data-allergy="allergy_seafood"><span class="emoji">🦐</span><span class="text" data-i18n="allergy_seafood">해산물</span></button>
        <button class="symptom-card" data-allergy="allergy_peach"><span class="emoji">🍑</span><span class="text" data-i18n="allergy_peach">복숭아</span></button>
        <button class="symptom-card" data-allergy="allergy_wheat"><span class="emoji">🌾</span><span class="text" data-i18n="allergy_wheat">밀가루</span></button>

        <button class="symptom-card" id="btn-voice-allergy"><span class="emoji">🎤</span><span class="text" data-i18n="allergy_voice">기타(직접 말하기)</span></button>
      </div>
    </div>
    
    <!-- Medication selection -->
    <div id="medication-container" style="margin-top: 3rem; padding-top: 2rem; border-top: 2px dashed #e2e8f0;">
      <h2 class="speakable" style="text-align: center;"><span data-i18n="med_title">먹고 있는 약이 있나요?</span><button class="btn-speaker">🔊</button></h2>
      <div class="symptoms-grid" id="medication-grid" style="margin-top: 2rem;">
        <button class="symptom-card" data-med="med_none"><span class="emoji">✅</span><span class="text" data-i18n="med_none">안 먹어요</span></button>
        <button class="symptom-card" data-med="med_cold"><span class="emoji">🤧</span><span class="text" data-i18n="med_cold">감기약</span></button>
        <button class="symptom-card" data-med="med_pain"><span class="emoji">💊</span><span class="text" data-i18n="med_pain">진통제</span></button>
        <button class="symptom-card" data-med="med_digest"><span class="emoji">🤢</span><span class="text" data-i18n="med_digest">소화제</span></button>
        <button class="symptom-card" data-med="med_hospital"><span class="emoji">🏥</span><span class="text" data-i18n="med_hospital">병원/처방약</span></button>
        <button class="symptom-card" data-med="med_idk"><span class="emoji">🤷</span><span class="text" data-i18n="med_idk">잘 모르겠어요</span></button>
      </div>
    </div>

    <!-- Voice Recognition Modal -->
    <div id="voice-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; display:none; align-items:center; justify-content:center; flex-direction:column; color:white;">
      <div style="background:white; color:black; padding:2rem; border-radius:1rem; width:90%; max-width:400px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1);">
        <div id="voice-status" style="font-size:1.2rem; font-weight:bold; margin-bottom:1rem;">마이크에 대고 말씀해주세요... 🎤</div>
        <div id="voice-transcript" style="color:#4B5563; min-height:3rem; margin-bottom:1rem; font-style:italic;"></div>
        
        <div id="voice-cards-container" class="hidden">
          <p style="margin-bottom:1rem; font-weight:bold; color:#1D4ED8;">아래 알레르기가 맞나요? (터치해서 선택/해제)</p>
          <div id="voice-cards-grid" style="display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; margin-bottom:1.5rem;">
            <!-- Cards injected here -->
          </div>
          <button id="btn-voice-confirm" class="btn btn-primary" style="width:100%; margin-bottom:0.5rem;">선택한 항목 추가하기</button>
        </div>
        
        <button id="btn-voice-retry" class="btn btn-secondary" style="width:100%; margin-bottom:0.5rem;">다시 말하기</button>
        <button id="btn-voice-cancel" class="btn" style="width:100%; background:#E5E7EB; color:#374151;">취소</button>
      </div>
    </div>

    <div class="step-actions" style="margin-top: 3rem;">
      <button id="btn-next" class="btn btn-primary hidden" data-i18n="btn_next">다음</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let state = getState();
      
      document.getElementById('btn-back').addEventListener('click', () => {
        window.location.href = 'step4.html';
      });

      const btnNext = document.getElementById('btn-next');

      // Allergy state initialization & restore
      state.allergies = (state.allergies || []).filter(a => a != null);
      state.allergies.forEach(a => {
        const btn = document.querySelector(`[data-allergy="${a}"]`);
        if (btn) btn.classList.add('selected');
      });
      // Restore custom allergies (voice-added) that don't have pre-existing buttons
      state.allergies.filter(a => a.startsWith('custom_')).forEach(key => {
        if (!document.querySelector(`[data-allergy="${key}"]`)) {
          const koName = key.substring(7);
          const newBtn = document.createElement('button');
          newBtn.className = 'symptom-card selected';
          newBtn.dataset.allergy = key;
          newBtn.innerHTML = `<span class="emoji">✨</span><span class="text">${koName}</span>`;
          newBtn.addEventListener('click', (e) => {
            if (e.currentTarget.classList.contains('selected')) {
              e.currentTarget.classList.remove('selected');
              state.allergies = state.allergies.filter(a => a !== key);
            } else {
              e.currentTarget.classList.add('selected');
              state.allergies.push(key);
            }
            saveState(state);
            checkComplete();
          });
          const grid = document.getElementById('allergy-grid');
          const voiceBtn = document.getElementById('btn-voice-allergy');
          if (voiceBtn) grid.insertBefore(newBtn, voiceBtn);
          else grid.appendChild(newBtn);
        }
      });

      // Medication selection logic
      state.medications = state.medications || [];
      // Restore previously selected medications
      state.medications.forEach(m => {
        const btn = document.querySelector(`[data-med="${m}"]`);
        if (btn) btn.classList.add('selected');
      });

      // Voice Recognition Logic
      const btnVoice = document.getElementById('btn-voice-allergy');
      const voiceModal = document.getElementById('voice-modal');
      const voiceStatus = document.getElementById('voice-status');
      const voiceTranscript = document.getElementById('voice-transcript');
      const voiceCardsContainer = document.getElementById('voice-cards-container');
      const voiceCardsGrid = document.getElementById('voice-cards-grid');
      const btnVoiceConfirm = document.getElementById('btn-voice-confirm');
      const btnVoiceRetry = document.getElementById('btn-voice-retry');
      const btnVoiceCancel = document.getElementById('btn-voice-cancel');

      let recognition = null;
      let finalExtractedAllergies = [];

      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
      } else {
        btnVoice.style.display = 'none'; // Hide if not supported
      }

      function startVoiceRecognition() {
        if (!recognition) return;
        
        // Reset Modal UI
        voiceModal.classList.remove('hidden');
        voiceModal.style.display = 'flex';
        voiceCardsContainer.classList.add('hidden');
        voiceStatus.innerText = "마이크에 대고 말씀해주세요... 🎤";
        voiceTranscript.innerText = "";
        finalExtractedAllergies = [];
        
        // Set language dynamically
        const langMap = {
          ko: 'ko-KR', en: 'en-US', zh: 'zh-CN', ru: 'ru-RU', vi: 'vi-VN',
          ja: 'ja-JP', tl: 'tl-PH', km: 'km-KH', th: 'th-TH', mn: 'mn-MN',
          uz: 'uz-UZ', ar: 'ar-SA'
        };
        recognition.lang = langMap[state.lang] || 'ko-KR';

        recognition.start();
      }

      btnVoice.addEventListener('click', (e) => {
        e.preventDefault();
        // Unselect "none" if selected
        const noneBtn = document.querySelector('[data-allergy="allergy_none"]');
        if (noneBtn && noneBtn.classList.contains('selected')) {
           noneBtn.classList.remove('selected');
           state.allergies = state.allergies.filter(a => a !== 'allergy_none');
        }
        startVoiceRecognition();
      });

      btnVoiceCancel.addEventListener('click', () => {
        if(recognition) recognition.stop();
        voiceModal.style.display = 'none';
        voiceModal.classList.add('hidden');
      });

      btnVoiceRetry.addEventListener('click', () => {
        if(recognition) recognition.stop();
        setTimeout(startVoiceRecognition, 300);
      });

      if(recognition) {
        recognition.onresult = (event) => {
          let interimTranscript = '';
          let finalTranscript = '';
          for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
              finalTranscript += event.results[i][0].transcript;
            } else {
              interimTranscript += event.results[i][0].transcript;
            }
          }
          voiceTranscript.innerText = finalTranscript || interimTranscript;
          
          if (finalTranscript) {
            processVoiceText(finalTranscript);
          }
        };

        recognition.onerror = (event) => {
          console.error("Speech recognition error", event.error);
          voiceStatus.innerText = "인식 오류: " + event.error;
        };
      }

      async function processVoiceText(text) {
        voiceStatus.innerText = "AI가 분석 중입니다... 🤖";
        const promptText = `너는 학생의 말을 듣고 알레르기 원인 물질을 추출 및 번역하는 의료 어시스턴트야.
현재 학생이 사용하는 언어는 ${state.lang}야.
[규칙]
1. 학생의 음성 인식 결과에서 알레르기 원인 물질을 추출해.
2. 추출된 단어를 학생이 읽을 수 있는 'native'와 보건교사가 읽을 'ko'(한국어) 두 가지 버전으로 작성해.
3. 주의: 만약 학생의 언어(${state.lang})가 'ko'라면 'native'에도 억지로 외국어로 번역하지 말고 한국어 단어 그대로 똑같이 적어!
4. 반드시 아래와 같은 순수 JSON 배열(Array of Objects) 형태로만 반환해! 다른 말은 절대 쓰지 마. 알레르기 원인이 없으면 빈 배열 [] 반환.
[출력 예시]
- 학생 언어가 'ru'일 때: [{"native": "креветки", "ko": "새우"}]
- 학생 언어가 'ko'일 때: [{"native": "새우", "ko": "새우"}]
학생 말: "${text}"`;

        try {
          const { data, error } = await db.functions.invoke('generate-ai-summary', {
            body: { promptText: promptText }
          });
          
          if (error) throw error;
          let aiResponse = data.choices[0].message.content;
          
          // 파싱을 위해 앞뒤 불필요한 텍스트(마크다운 백틱 등) 제거
          aiResponse = aiResponse.replace(/```json/g, '').replace(/```/g, '').trim();
          
          const extracted = JSON.parse(aiResponse);
          if (extracted && extracted.length > 0) {
             showExtractedCards(extracted);
          } else {
             voiceStatus.innerText = "알레르기를 찾지 못했어요 😢";
             voiceTranscript.innerText = "다시 한 번 말씀해 주시겠어요?";
          }
        } catch(e) {
          console.error("AI Extraction Error", e);
          voiceStatus.innerText = "AI 분석 실패 😢";
        }
      }

      function showExtractedCards(allergies) {
        voiceStatus.innerText = "분석 완료!";
        voiceCardsContainer.classList.remove('hidden');
        voiceCardsGrid.innerHTML = '';
        
        allergies.forEach((item, index) => {
           // 기본적으로 선택된 상태로 렌더링
           const card = document.createElement('button');
           card.className = 'symptom-card selected';
           card.style.margin = '0';
           card.style.padding = '0.5rem 1rem';
           card.style.flex = '1 1 auto';
           // native 텍스트 표시. 한국어랑 같다면 하나만 표시
           const displayTxt = (item.native && item.native !== item.ko) ? `${item.native} (${item.ko})` : item.ko;
           card.innerHTML = `<span class="text">${displayTxt}</span>`;
           
           // 클릭 시 토글
           card.addEventListener('click', () => {
             card.classList.toggle('selected');
           });
           
           // Store data on DOM
           card.dataset.ko = item.ko;
           card.dataset.native = item.native;
           
           voiceCardsGrid.appendChild(card);
        });
      }

      btnVoiceConfirm.addEventListener('click', () => {
        // 선택된 카드들만 가져오기
        const selectedCards = voiceCardsGrid.querySelectorAll('.symptom-card.selected');
        selectedCards.forEach(card => {
           const koName = card.dataset.ko;
           const nativeName = card.dataset.native;
           const displayTxt = (nativeName && nativeName !== koName) ? `${nativeName} (${koName})` : koName;
           const key = `custom_${koName}`;
           
           // 메인 그리드에 이미 이 키를 가진 버튼이 있는지 확인
           let existingBtn = document.querySelector(`[data-allergy="${key}"]`);
           if (!existingBtn) {
             // 버튼 새로 만들어서 그리드에 추가 (기타 버튼 바로 앞에)
             existingBtn = document.createElement('button');
             existingBtn.className = 'symptom-card selected';
             existingBtn.dataset.allergy = key;
             existingBtn.innerHTML = `<span class="emoji">✨</span><span class="text">${displayTxt}</span>`;
             
             existingBtn.addEventListener('click', (e) => {
                if (e.currentTarget.classList.contains('selected')) {
                  e.currentTarget.classList.remove('selected');
                  state.allergies = state.allergies.filter(a => a !== key);
                } else {
                  e.currentTarget.classList.add('selected');
                  state.allergies.push(key);
                }
                saveState(state);
                checkComplete();
             });
             
             // Insert before the voice button
             const grid = document.getElementById('allergy-grid');
             grid.insertBefore(existingBtn, btnVoice);
           } else {
             existingBtn.classList.add('selected');
           }
           
           // state 배열에 추가
           if (!state.allergies.includes(key)) {
             state.allergies.push(key);
           }
        });
        
        saveState(state);
        checkComplete();
        voiceModal.style.display = 'none';
        voiceModal.classList.add('hidden');
      });

      function checkComplete() {
        const hasAllergy = document.querySelector('#allergy-grid .symptom-card.selected');
        const hasMed = document.querySelector('#medication-grid .symptom-card.selected');
        if (!hasAllergy || !hasMed) { 
          btnNext.classList.add('hidden'); 
        } else {
          btnNext.classList.remove('hidden');
        }
      }
      checkComplete();

      document.querySelectorAll('#allergy-grid .symptom-card').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const key = e.currentTarget.dataset.allergy;
          if (!key) return; // Skip voice button

          if (key === 'allergy_none') {
            document.querySelectorAll('#allergy-grid .symptom-card').forEach(b => b.classList.remove('selected'));
            e.currentTarget.classList.add('selected');
            state.allergies = ['allergy_none'];
          } else {
            const noneBtn = document.querySelector('[data-allergy="allergy_none"]');
            if (noneBtn) noneBtn.classList.remove('selected');
            state.allergies = state.allergies.filter(a => a !== 'allergy_none');
            
            if (e.currentTarget.classList.contains('selected')) {
              e.currentTarget.classList.remove('selected');
              state.allergies = state.allergies.filter(a => a !== key);
            } else {
              e.currentTarget.classList.add('selected');
              state.allergies.push(key);
            }
          }
          saveState(state);
          checkComplete();
        });
      });

      document.querySelectorAll('#medication-grid .symptom-card').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const key = e.currentTarget.dataset.med;
          if (key === 'med_none' || key === 'med_idk') {
            document.querySelectorAll('#medication-grid .symptom-card').forEach(b => b.classList.remove('selected'));
            e.currentTarget.classList.add('selected');
            state.medications = [key];
          } else {
            const noneBtn = document.querySelector('[data-med="med_none"]');
            const idkBtn = document.querySelector('[data-med="med_idk"]');
            if (noneBtn) noneBtn.classList.remove('selected');
            if (idkBtn) idkBtn.classList.remove('selected');
            state.medications = state.medications.filter(m => m !== 'med_none' && m !== 'med_idk');
            
            if (e.currentTarget.classList.contains('selected')) {
              e.currentTarget.classList.remove('selected');
              state.medications = state.medications.filter(m => m !== key);
            } else {
              e.currentTarget.classList.add('selected');
              state.medications.push(key);
            }
          }
          saveState(state);
          checkComplete();
        });
      });
      btnNext.addEventListener('click', () => {
        window.location.href = 'step5.html';
      });
    });
  </script>
</body>
</html>
