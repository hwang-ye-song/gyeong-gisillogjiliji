<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>그림 터치 문진표 - 어디가 아파요?</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .body-map-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      min-height: 0; /* flex 자식이 overflow 되지 않도록 */
    }
    .svg-body {
      flex: 1 1 auto;
      max-height: 100%;
      max-width: 320px;
      width: auto;
      height: auto;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }
    .hitbox {
      fill: transparent;
      stroke: transparent;
      cursor: pointer;
      transition: fill 0.15s;
    }
    .hitbox:hover, .hitbox:active, .hitbox.hover-highlight {
      fill: rgba(99, 102, 241, 0.25);
      stroke: var(--primary);
      stroke-width: 2;
    }
    .hitbox.highlight {
      fill: rgba(99, 102, 241, 0.3);
      stroke: var(--primary);
      stroke-width: 3;
    }
    .whole-body-btn {
      flex-shrink: 0;
      padding: 0.6rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
    }
    .whole-body-btn .emoji {
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <header>
    <button class="btn btn-secondary" onclick="window.location.href='index.html'">
      <span class="icon">◀</span> <span class="text" data-i18n="btn_prev">이전</span>
    </button>
    <div id="progress-bar"><div id="progress-fill" style="width: 20%;"></div><span id="progress-text">1 / 5</span></div>
    <button id="btn-nurse-lock" class="btn-icon">🔒</button>
  </header>

  <section class="step active">
    <h1 class="speakable"><span data-i18n="step_1_title">어디가 아파요?</span><button class="btn-speaker">🔊</button></h1>

    <div class="body-map-container">
      <svg class="svg-body" viewBox="0 0 200 450" xmlns="http://www.w3.org/2000/svg">
        <!-- Base Body Drawing -->
        <g fill="#E5E7EB" stroke="#9CA3AF" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
          <circle cx="100" cy="50" r="30" />
          <rect x="90" y="80" width="20" height="20" />
          <path d="M70 100 L130 100 L120 220 L80 220 Z" />
          <path d="M70 100 L30 180 L40 190 L75 120 Z" />
          <path d="M130 100 L170 180 L160 190 L125 120 Z" />
          <circle cx="35" cy="185" r="10" />
          <circle cx="165" cy="185" r="10" />
          <path d="M80 220 L60 380 L75 380 L95 220 Z" />
          <path d="M120 220 L140 380 L125 380 L105 220 Z" />
          <ellipse cx="68" cy="385" rx="15" ry="8" />
          <ellipse cx="132" cy="385" rx="15" ry="8" />
        </g>
        
        <!-- Head & Neck -->
        <circle class="hitbox" cx="100" cy="50" r="40" data-part="part_head" data-group="head" />
        <rect class="hitbox" x="85" y="80" width="30" height="20" data-part="part_head" data-group="head" />
        <rect class="hitbox" x="65" y="100" width="70" height="50" data-part="part_chest" />
        <rect class="hitbox" x="70" y="150" width="60" height="70" data-part="part_belly" />
        <polygon class="hitbox" points="70,100 25,195 45,195 75,120" data-part="part_arm" data-group="arm" />
        <polygon class="hitbox" points="130,100 175,195 155,195 125,120" data-part="part_arm" data-group="arm" />
        <polygon class="hitbox" points="80,220 50,395 85,395 95,220" data-part="part_leg" data-group="leg" />
        <polygon class="hitbox" points="120,220 150,395 115,395 105,220" data-part="part_leg" data-group="leg" />
      </svg>

      <button class="btn btn-primary whole-body-btn" data-part="part_whole">
        <span class="emoji">🧍</span> <span class="text" data-i18n="part_whole">온 몸 전체</span>
      </button>
    </div>
  </section>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Handle whole-body button
      document.querySelector('.whole-body-btn').addEventListener('click', (e) => {
        let state = getState();
        state.headSubSelected = false; state.bellyPos = null; state.hurtMethod = null; state.hurtState = null; state.symptoms = [];
        const p = e.currentTarget.dataset.part;
        if (p) { state.part = translations.ko[p]; }
        saveState(state);
        window.location.href = 'step2.html';
      });

      // Handle SVG Hitboxes
      document.querySelectorAll('.hitbox').forEach(box => {
        box.addEventListener('click', (e) => {
          let state = getState();
          state.headSubSelected = false; state.bellyPos = null; state.hurtMethod = null; state.hurtState = null; state.symptoms = [];
          state.part = translations.ko[e.currentTarget.dataset.part];
          
          const group = e.currentTarget.dataset.group;
          if (group) {
            document.querySelectorAll(`.hitbox[data-group="${group}"]`).forEach(h => h.classList.add('highlight'));
            
            if (group === 'arm' || group === 'leg') {
              state.sideSelect = group; // 팔/다리일 경우만 좌우 선택
            } else {
              state.sideSelect = null; // 머리/목 같은 다른 그룹은 좌우 선택 안함
            }
            
            saveState(state);
            setTimeout(() => { window.location.href = 'step1_sub.html'; }, 350);
          } else {
            state.sideSelect = null;
            saveState(state);
            if (e.currentTarget.dataset.part === 'part_belly') {
              window.location.href = 'step1_sub.html';
            } else {
              window.location.href = 'step2.html';
            }
          }
        });

        // Hover Effect for Groups (마우스 오버 시 양쪽 동시 하이라이트)
        box.addEventListener('mouseenter', (e) => {
          const group = e.currentTarget.dataset.group;
          if (group) {
            document.querySelectorAll(`.hitbox[data-group="${group}"]`).forEach(h => h.classList.add('hover-highlight'));
          }
        });
        
        box.addEventListener('mouseleave', (e) => {
          const group = e.currentTarget.dataset.group;
          if (group) {
            document.querySelectorAll(`.hitbox[data-group="${group}"]`).forEach(h => h.classList.remove('hover-highlight'));
          }
        });
      });
    });
  </script>
</body>
</html>
