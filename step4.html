<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>그림 터치 문진표 - 언제부터 아파요?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <button class="btn btn-secondary" onclick="window.location.href='step3.html'">
      <span class="icon">◀</span> <span class="text" data-i18n="btn_prev">이전</span>
    </button>
    <div id="progress-bar"><div id="progress-fill" style="width: 80%;"></div><span id="progress-text">4 / 5</span></div>
    <button id="btn-nurse-lock" class="btn-icon">🔒</button>
  </header>

  <section class="step active">
    <h1 class="speakable"><span data-i18n="step_4_title">언제부터 아파요?</span><button class="btn-speaker">🔊</button></h1>
    
    <div id="time-list-container" style="display:flex; flex-direction:column; gap:2rem;">
      <!-- Dynamically filled by JS -->
    </div>

    <!-- Follow up questions -->
    <div id="follow-up-container" class="hidden">
      <div id="follow-belly" class="hidden hurt-flow">
        <h2 class="speakable"><span data-i18n="follow_belly">밥을 먹었어요?</span><button class="btn-speaker">🔊</button></h2>
        <div class="symptoms-grid single-select">
          <button class="symptom-card" data-follow="belly_yes"><span class="emoji">⭕</span><span class="text" data-i18n="yes">네</span></button>
          <button class="symptom-card" data-follow="belly_no"><span class="emoji">❌</span><span class="text" data-i18n="no">아니요</span></button>
        </div>
      </div>
      <div id="follow-fever" class="hidden hurt-flow">
        <h2 class="speakable"><span data-i18n="follow_fever">약을 먹었어요?</span><button class="btn-speaker">🔊</button></h2>
        <div class="symptoms-grid single-select">
          <button class="symptom-card" data-follow="fever_yes"><span class="emoji">⭕</span><span class="text" data-i18n="yes">네</span></button>
          <button class="symptom-card" data-follow="fever_no"><span class="emoji">❌</span><span class="text" data-i18n="no">아니요</span></button>
        </div>
      </div>
      <div id="follow-vomit" class="hidden hurt-flow">
        <h2 class="speakable"><span data-i18n="follow_vomit">몇 번 토했어요?</span><button class="btn-speaker">🔊</button></h2>
        <div class="symptoms-grid single-select">
          <button class="symptom-card" data-follow="vomit_1"><span class="emoji">1️⃣</span><span class="text" data-i18n="vomit_1">1번</span></button>
          <button class="symptom-card" data-follow="vomit_2"><span class="emoji">2️⃣</span><span class="text" data-i18n="vomit_2">2번</span></button>
          <button class="symptom-card" data-follow="vomit_3"><span class="emoji">3️⃣</span><span class="text" data-i18n="vomit_3">3번 이상</span></button>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="step-actions" style="margin-top: 1.5rem; text-align: center; gap: 1rem; display: flex; justify-content: center;">
      <button id="btn-restart" class="btn btn-secondary" data-i18n="btn_restart" disabled>다른 곳도 아파요</button>
      <button id="btn-next" class="btn btn-primary" data-i18n="btn_next" disabled>다음</button>
    </div>
  </section>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let state = getState();
      if (!state.records || state.records.length === 0) { window.location.href = 'step1.html'; return; }

      const fContainer = document.getElementById('follow-up-container');
      const btnNext = document.getElementById('btn-next');
      
      let needFollowUp = false;
      let allSymptoms = [];
      let hasBelly = false;
      let hasFever = false;
      let hasVomit = false;

      state.records.forEach((record, rIdx) => {
         record.symptoms.forEach((s, sIdx) => {
             allSymptoms.push({
                 id: `time_${rIdx}_${sIdx}`,
                 partName: record.partObj.name,
                 symptom: s,
                 recordIndex: rIdx
             });
             if (s.includes('배')) hasBelly = true;
             if (s.includes('열이 나요')) hasFever = true;
             if (s.includes('토할 것 같아요')) hasVomit = true;
         });
         if (record.partObj.lookupPart === '배' || record.partObj.lookupPart === '윗배' || record.partObj.lookupPart === '아랫배' || record.partObj.lookupPart === '몸통') {
             hasBelly = true;
         }
      });

      if (hasBelly) {
        document.getElementById('follow-belly').classList.remove('hidden');
        needFollowUp = true;
      }
      if (hasFever) {
        document.getElementById('follow-fever').classList.remove('hidden');
        needFollowUp = true;
      }
      if (hasVomit) {
        document.getElementById('follow-vomit').classList.remove('hidden');
        needFollowUp = true;
      }

      const container = document.getElementById('time-list-container');
      const btnRestart = document.getElementById('btn-restart');
      
      function checkCompletion() {
        const timeComplete = allSymptoms.every(item => state.records[item.recordIndex].startTimes && state.records[item.recordIndex].startTimes[item.symptom]);
        let followUpComplete = true;
        if (needFollowUp) {
          const visibleQs = document.querySelectorAll('#follow-up-container > div:not(.hidden)');
          visibleQs.forEach(q => { if (!q.querySelector('.selected')) followUpComplete = false; });
        }
        
        let traumaComplete = true;
        const traumaBoxes = document.querySelectorAll('.follow-up-box');
        traumaBoxes.forEach(box => {
            if (!box.querySelector('.selected')) traumaComplete = false;
        });
        
        const allDone = timeComplete && followUpComplete && traumaComplete;
        btnNext.disabled = !allDone;
        btnRestart.disabled = !allDone;
      }

      allSymptoms.forEach(item => {
        const { id, partName, symptom, recordIndex } = item;
        const translatedSymptom = translateKoToLang(symptom, state.lang);
        
        let translatedPart = partName;
        const t = translations[state.lang] || translations['ko'];
        if (t[partName]) translatedPart = t[partName];
        else if (t[state.records[recordIndex].partObj.id]) translatedPart = t[state.records[recordIndex].partObj.id];
        
        const isTrauma = /다침|상처|피|멍|부러|화상|동물|벌레|삐었/.test(symptom);

        let followUpHtml = '';
        if (isTrauma) {
            followUpHtml = `
              <div class="follow-up-box" data-record-index="${recordIndex}" data-symptom="${symptom}" style="margin-top:1rem; padding:1rem; background:#FFFBEB; border:1px solid #FCD34D; border-radius:8px;">
                <p style="font-weight:bold; margin-bottom:0.5rem; color:#B45309;" data-i18n="follow_trauma">어떻게 다쳤나요?</p>
                <div class="symptoms-grid single-select trauma-grid" style="grid-template-columns: repeat(1, 1fr); gap: 0.5rem;">
                  <button class="symptom-card" data-trauma="trauma_friend"><span class="text" data-i18n="trauma_friend">친구랑 장난치다</span></button>
                  <button class="symptom-card" data-trauma="trauma_alone"><span class="text" data-i18n="trauma_alone">혼자 넘어짐/부딪힘</span></button>
                  <button class="symptom-card" data-trauma="trauma_sports"><span class="text" data-i18n="trauma_sports">체육시간/운동하다가</span></button>
                </div>
              </div>
            `;
        }

        const block = document.createElement('div');
        block.className = 'symptom-time-block';
        block.style.width = '100%';
        block.innerHTML = `
          <h3 style="text-align: center; color: var(--primary); margin-bottom: 1rem;"><span style="font-size: 0.9em; color: var(--text-sub);">[${translatedPart}]</span><br>${translatedSymptom}</h3>
          <div class="symptoms-grid single-select time-grid" style="grid-template-columns: repeat(3, 1fr); gap: 0.5rem;" data-id="${id}" data-record-index="${recordIndex}" data-symptom="${symptom}">
            <button class="symptom-card" data-time="time_before"><span class="emoji">🏠</span><span class="text" data-i18n="time_before" style="font-size:0.9rem;">학교오기 전</span></button>
            <button class="symptom-card" data-time="time_p1"><span class="emoji">1️⃣</span><span class="text" data-i18n="time_p1" style="font-size:0.9rem;">1교시</span></button>
            <button class="symptom-card" data-time="time_p2"><span class="emoji">2️⃣</span><span class="text" data-i18n="time_p2" style="font-size:0.9rem;">2교시</span></button>
            <button class="symptom-card" data-time="time_p3"><span class="emoji">3️⃣</span><span class="text" data-i18n="time_p3" style="font-size:0.9rem;">3교시</span></button>
            <button class="symptom-card" data-time="time_p4"><span class="emoji">4️⃣</span><span class="text" data-i18n="time_p4" style="font-size:0.9rem;">4교시</span></button>
            <button class="symptom-card" data-time="time_lunch"><span class="emoji">🍱</span><span class="text" data-i18n="time_lunch" style="font-size:0.9rem;">점심시간</span></button>
            <button class="symptom-card" data-time="time_p5"><span class="emoji">5️⃣</span><span class="text" data-i18n="time_p5" style="font-size:0.9rem;">5교시</span></button>
            <button class="symptom-card" data-time="time_p6"><span class="emoji">6️⃣</span><span class="text" data-i18n="time_p6" style="font-size:0.9rem;">6교시</span></button>
            <button class="symptom-card" data-time="time_days"><span class="emoji">📅</span><span class="text" data-i18n="time_days" style="font-size:0.9rem;">며칠 전</span></button>
            <button class="symptom-card" data-time="idk" style="grid-column: span 3;"><span class="emoji">❓</span><span class="text" data-i18n="idk">잘 모르겠어요</span></button>
          </div>
          ${followUpHtml}
        `;
        container.appendChild(block);

        // Restore if exists
        const rRec = state.records[recordIndex];
        if (rRec.startTimes && rRec.startTimes[symptom]) {
          const key = Object.keys(translations.ko).find(k => translations.ko[k] === rRec.startTimes[symptom]);
          if (key) {
             const btn = block.querySelector(`.symptom-card[data-time="${key}"]`);
             if (btn) btn.classList.add('selected');
          }
        }
      });
      
      applyLanguageToUI();

      // Trauma cause buttons
      document.querySelectorAll('.follow-up-box').forEach(box => {
        const rIdx = box.dataset.recordIndex;
        const symptom = box.dataset.symptom;
        box.querySelectorAll('[data-trauma]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            box.querySelectorAll('[data-trauma]').forEach(b => b.classList.remove('selected'));
            e.currentTarget.classList.add('selected');
            const traumaKey = e.currentTarget.dataset.trauma;
            state.records[rIdx].traumaCauses = state.records[rIdx].traumaCauses || {};
            state.records[rIdx].traumaCauses[symptom] = translations.ko[traumaKey] || traumaKey;
            saveState(state);
            checkCompletion();
          });
        });
      });

      document.querySelectorAll('.time-grid').forEach(tg => {
        const symptom = tg.dataset.symptom;
        const rIdx = tg.dataset.recordIndex;
        tg.querySelectorAll('.symptom-card').forEach(btn => {
          btn.addEventListener('click', (e) => {
            tg.querySelectorAll('.symptom-card').forEach(b => b.classList.remove('selected'));
            e.currentTarget.classList.add('selected');
            const key = e.currentTarget.dataset.time;
            state.records[rIdx].startTimes = state.records[rIdx].startTimes || {};
            state.records[rIdx].startTimes[symptom] = translations.ko[key] || "잘 모르겠어요";
            saveState(state);
            
            if (needFollowUp) {
              fContainer.classList.remove('hidden');
            }
            checkCompletion();
          });
        });
      });

      document.querySelectorAll('#follow-up-container .symptom-card').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const parent = e.currentTarget.closest('.single-select');
          parent.querySelectorAll('.symptom-card').forEach(b => b.classList.remove('selected'));
          e.currentTarget.classList.add('selected');
          
          state.followups = [];
          if (document.querySelector('[data-follow="belly_yes"].selected')) state.followups.push({q: "밥을 먹었어요?", a: "네"});
          if (document.querySelector('[data-follow="belly_no"].selected')) state.followups.push({q: "밥을 먹었어요?", a: "아니요"});
          if (document.querySelector('[data-follow="fever_yes"].selected')) state.followups.push({q: "약을 먹었어요?", a: "네"});
          if (document.querySelector('[data-follow="fever_no"].selected')) state.followups.push({q: "약을 먹었어요?", a: "아니요"});
          if (document.querySelector('[data-follow^="vomit_"].selected')) {
            const v = document.querySelector('[data-follow^="vomit_"].selected').dataset.follow.replace('vomit_', '');
            const map = { "1": "1번", "2": "2번", "3": "3번 이상"};
            state.followups.push({q: "몇 번 토했어요?", a: map[v]});
          }
          saveState(state);
          checkCompletion();
        });
      });

      function saveEntry() {
        if (state.part) {
          state.previousEntries.push({
            part: state.part,
            bellyPos: state.bellyPos,
            hurtMethod: state.hurtMethod,
            hurtState: state.hurtState,
            headQ: state.headQ,
            symptoms: state.symptoms,
            painLevels: state.painLevels,
            startTimes: state.startTimes,
            followups: state.followups
          });
        }
      }

      btnRestart.addEventListener('click', () => {
        saveEntry();
        // Reset only current part fields, keep previousEntries and allergies
        state.part = null; state.bellyPos = null; state.hurtMethod = null; state.hurtState = null;
        state.headQ = null; state.symptoms = []; state.painLevels = {}; state.startTimes = {}; state.followups = []; state.headSubSelected = false;
        state.sideSelect = null; state.sideSelected = false; state.sideLabel = null;
        saveState(state);
        window.location.href = 'step1.html';
      });

      btnNext.addEventListener('click', () => {
        saveEntry();
        // Reset current fields so step5 pulls from previousEntries cleanly
        state.part = null; state.bellyPos = null; state.hurtMethod = null; state.hurtState = null;
        state.headQ = null; state.symptoms = []; state.painLevels = {}; state.startTimes = {}; state.followups = []; state.headSubSelected = false;
        state.sideSelect = null; state.sideSelected = false; state.sideLabel = null;
        saveState(state);
        window.location.href = 'step4_allergy.html';
      });
    });
  </script>
</body>
</html>
