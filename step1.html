<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>그림 터치 문진표 - 어디가 아파요?</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .body-map-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      min-height: 0; /* flex 자식이 overflow 되지 않도록 */
    }
    .svg-body {
      flex: 1 1 auto;
      max-height: 100%;
      max-width: 320px;
      width: auto;
      height: auto;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }
    .hitbox {
      fill: transparent;
      stroke: transparent;
      cursor: pointer;
      transition: fill 0.15s;
    }
    .hitbox:hover, .hitbox:active, .hitbox.hover-highlight {
      fill: rgba(99, 102, 241, 0.25);
      stroke: var(--primary);
      stroke-width: 2;
    }
    .hitbox.highlight {
      fill: rgba(99, 102, 241, 0.3);
      stroke: var(--primary);
      stroke-width: 3;
    }
    .whole-body-btn {
      flex-shrink: 0;
      padding: 0.6rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
    }
    .whole-body-btn .emoji {
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <header>
    <button class="btn btn-secondary" onclick="window.location.href='index.html'">
      <span class="icon">◀</span> <span class="text" data-i18n="btn_prev">이전</span>
    </button>
    <div id="progress-bar"><div id="progress-fill" style="width: 20%;"></div><span id="progress-text">1 / 5</span></div>
    <button id="btn-nurse-lock" class="btn-icon">🔒</button>
  </header>

  <section class="step active">
    <h1 class="speakable"><span data-i18n="step_1_title">어디가 아파요?</span><button class="btn-speaker">🔊</button></h1>

    <!-- Body Map Interface -->
    <div class="body-map-container" style="position: relative; width: 100%; max-width: 600px; margin: 0 auto 2rem auto;">
      <img src="body_transparent.png" alt="Body" style="width: 100%; display: block; border-radius: 12px; pointer-events: none;" />
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
        <style>
          .body-area { fill: transparent; cursor: pointer; transition: fill 0.2s; }
          .body-area:hover, .body-area:active { fill: rgba(74, 144, 226, 0.5); }
        </style>
        <!-- 머리 -->
        <ellipse cx="49.6" cy="11" rx="5" ry="6" class="body-area" data-part="part_head" />
        <!-- 가슴 -->
        <rect x="42" y="17" width="15" height="17" rx="1" class="body-area" data-part="part_chest" />
        <!-- 배 -->
        <rect x="42" y="34" width="15" height="18" rx="1" class="body-area" data-part="part_belly" />
        <!-- 양팔(어느 쪽인지 선택 전이므로 함께 하이라이트) -->
        <g class="body-area" data-part="part_arm">
          <polygon points="43,18 34,40 30,55 36,56 41,38" />
          <polygon points="56,18 65,40 69,55 63,56 58,38" />
        </g>
        <!-- 양다리(어느 쪽인지 선택 전이므로 함께 하이라이트) -->
        <g class="body-area" data-part="part_leg">
          <polygon points="43,52 39,70 38,94 45,94 48,52" />
          <polygon points="56,52 60,70 61,94 54,94 51,52" />
        </g>
      </svg>
    </div>
    
    <!-- 온몸이 아파요 (몸 전체) 버튼 -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <button class="symptom-card" data-part="part_whole" style="padding: 0.6rem 1.5rem; border-radius: 30px; font-weight: bold; background: white; border: 2px solid #e2e8f0; color: var(--primary); display: inline-flex; align-items: center; gap: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <span class="emoji" style="font-size: 1.2rem;">🤒</span>
        <span class="text" data-i18n="part_whole">몸 전체</span>
      </button>
    </div>
  </section>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.symptom-card, .body-area').forEach(btn => {
        btn.addEventListener('click', (e) => {
          let state = getState();
          const target = e.currentTarget;
          const partKey = target.dataset.part;
          
          state.headSubSelected = false; 
          state.bellyPos = null; 
          state.hurtMethod = null; 
          state.hurtState = null; 
          state.symptoms = [];
          
          if (partKey === 'part_chest') {
            state.part = (translations.ko['part_belly'] || '가슴/배/등') + ' (' + (translations.ko['belly_chest'] || '가슴') + ')';
          } else {
            state.part = translations.ko[partKey] || partKey;
          }
          
          if (partKey === 'idk') {
            state.sideSelect = null;
            state.symptoms.push(translations.ko['idk']);
            saveState(state);
            window.location.href = 'step4.html';
          } else if (partKey === 'part_arm' || partKey === 'part_leg') {
            state.sideSelect = partKey === 'part_arm' ? 'arm' : 'leg';
            saveState(state);
            window.location.href = 'step1_sub.html';
          } else if (partKey === 'part_head' || partKey === 'part_belly') {
            state.sideSelect = null;
            saveState(state);
            window.location.href = 'step1_sub.html';
          } else if (partKey === 'part_chest') {
            state.sideSelect = null;
            saveState(state);
            window.location.href = 'step2.html';
          } else {
            state.sideSelect = null;
            saveState(state);
            window.location.href = 'step2.html';
          }
        });
      });
    });
  </script>
</body>
</html>
